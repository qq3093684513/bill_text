        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }
        body.light-mode { background: #fff; color: rgba(28,31,35,1); }
        body.dark-mode { background: rgba(22,22,26,1); color: rgba(249,249,249,1); }

        .color-swatch { border-radius: 4px; transition: transform 0.15s; cursor: pointer; position: relative; }
        .color-swatch:hover { transform: scale(1.08); z-index: 2; }
        .color-swatch .tooltip {
            display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: rgba(28,31,35,0.9); color: #fff; padding: 4px 8px; border-radius: 4px;
            font-size: 11px; white-space: nowrap; pointer-events: none; z-index: 10;
        }
        .color-swatch:hover .tooltip { display: block; }

        .section-title {
            font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px;
            border-bottom: 2px solid; display: inline-block;
        }
        .light-mode .section-title { border-color: rgba(var(--semi-brand-5),1); color: rgba(28,31,35,1); }
        .dark-mode .section-title { border-color: rgba(50,149,251,1); color: rgba(249,249,249,1); }

        .sub-label { font-size: 12px; color: rgba(var(--semi-grey-5),1); margin-bottom: 6px; }
        .dark-mode .sub-label { color: rgba(136,141,146,1); }

        .palette-row { display: flex; gap: 0; border-radius: 6px; overflow: hidden; }
        .palette-row .color-swatch { border-radius: 0; flex: 1; height: 32px; }

        /* Theme toggle */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            display: flex; align-items: center; gap: 8px; padding: 8px 16px;
            border-radius: 9999px; cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.3s;
        }
        .light-mode .theme-toggle { background: rgba(var(--semi-grey-9),1); color: #fff; }
        .dark-mode .theme-toggle { background: rgba(249,249,249,1); color: rgba(28,31,35,1); }

        .semantic-card {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 16px 20px; border-radius: 8px; min-width: 100px; transition: all 0.2s;
        }
        .light-mode .semantic-card { border: 1px solid rgba(var(--semi-grey-9),0.08); }
        .dark-mode .semantic-card { border: 1px solid rgba(255,255,255,0.08); }
        .semantic-card:hover { box-shadow: var(--semi-shadow-elevated); }
        .semantic-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Text color demo table */
        .text-demo-table { width: 100%; border-collapse: collapse; }
        .text-demo-table td { padding: 10px 12px; font-size: 13px; vertical-align: middle; }
        .light-mode .text-demo-table tr { border-bottom: 1px solid rgba(var(--semi-grey-9),0.06); }
        .dark-mode .text-demo-table tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
        .text-demo-table tr:last-child { border-bottom: none; }

        /* Button styles */
        .btn {
            padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
            border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
        }
        .btn-primary { background: rgba(var(--semi-brand-5),1); color: #fff; }
        .btn-primary:hover { background: rgba(var(--semi-brand-6),1); }
        .btn-secondary { background: transparent; color: rgba(var(--semi-brand-5),1); }
        .light-mode .btn-secondary { border: 1px solid rgba(var(--semi-grey-9),0.15); }
        .dark-mode .btn-secondary { border: 1px solid rgba(255,255,255,0.15); color: rgba(50,149,251,1); }
        .btn-danger { background: rgba(var(--semi-red-5),1); color: #fff; }
        .btn-danger:hover { background: rgba(var(--semi-red-6),1); }
        .btn-warning { background: rgba(var(--semi-orange-5),1); color: #fff; }
        .btn-warning:hover { background: rgba(var(--semi-orange-6),1); }
        .btn-success { background: rgba(var(--semi-green-5),1); color: #fff; }
        .btn-success:hover { background: rgba(var(--semi-green-6),1); }
        .btn-info { background: rgba(var(--semi-blue-5),1); color: #fff; }

    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = colors.map((c, i) =>

}

function renderAnimations() {

            return `<div style="display:flex;align-items:center;gap:12px;">
                <div style="width:80px;font-size:11px;text-align:right;color:rgba(var(--semi-grey-5),1);">${d.name}</div>
                <div class="anim-bar" style="flex:1;position:relative;">
                    <div style="height:100%;width:${pct}%;border-radius:4px;transition:width 0.5s;" class="anim-bar-fill"></div>
                </div>
                <div style="width:50px;font-size:12px;font-weight:500;font-variant-numeric:tabular-nums;">${d.value}ms</div>
            </div>`;
        }).join('')}
    </div>`;
    // Style the bar fills
    document.querySelectorAll('.anim-bar-fill').forEach(bar => {
        bar.style.background = isDark() ? 'rgba(50,149,251,0.8)' : 'rgba(var(--semi-brand-5),0.8)';
    });

    // Delay (与 Duration 相同的数据)
    const delayEl = document.getElementById('delay-demo');
    delayEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;">
        ${DELAYS.map(d => {
            const pct = (d.value / 1800) * 100;
            return `<div style="display:flex;align-items:center;gap:12px;">
                <div style="width:80px;font-size:11px;text-align:right;color:rgba(var(--semi-grey-5),1);">${d.name}</div>
                <div class="anim-bar" style="flex:1;position:relative;">
                    <div style="height:100%;width:${pct}%;border-radius:4px;" class="delay-bar-fill"></div>
                </div>

            </div>`;
        }).join('')}
    </div>`;
    document.querySelectorAll('.delay-bar-fill').forEach(bar => {
        bar.style.background = isDark() ? 'rgba(155,209,0,0.6)' : 'rgba(var(--semi-lime-5),0.6)';
    });

    // Easing
    const easeEl = document.getElementById('easing-demo');
    easeEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;">
        ${EASINGS.map(e => `<div style="display:flex;align-items:center;gap:12px;">
            <div style="width:80px;font-size:11px;text-align:right;color:rgba(var(--semi-grey-5),1);">${e.name}</div>
            <div style="flex:1;height:32px;position:relative;border-radius:4px;overflow:hidden;" class="easing-track">
                <div class="anim-demo-box easing-ball" style="position:absolute;left:0;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;font-size:9px;"
                     data-ease="${e.curve}"></div>
            </div>
            <div style="width:180px;font-size:10px;font-family:monospace;color:rgba(var(--semi-grey-5),1);">${e.value}</div>
        </div>`).join('')}
    </div>`;
    // Style easing track
    document.querySelectorAll('.easing-track').forEach(t => {
        t.style.background = isDark() ? 'rgba(53,54,60,1)' : 'rgba(var(--semi-grey-1),1)';
    });
    // Animate easing balls
    animateEasingBalls();

    // Scale
    const scaleEl = document.getElementById('scale-demo');
    scaleEl.innerHTML = SCALES.map((s, i) => `<div style="text-align:center;">
        <div class="anim-demo-box scale-box" style="width:50px;height:50px;" data-scale="${i}">${s.name}</div>
        <div style="font-size:10px;margin-top:4px;color:rgba(var(--semi-grey-5),1);">${s.value}</div>
    </div>`).join('');
    animateScaleBoxes();

    // Rotate
    const rotEl = document.getElementById('rotate-demo');
    rotEl.innerHTML = ROTATES.map(r => `<div style="text-align:center;">
        <div style="width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;"
             class="rotate-box" data-rotate="${r.value}">${r.name}</div>
        <div style="font-size:10px;margin-top:4px;color:rgba(var(--semi-grey-5),1);">${r.value}</div>
    </div>`).join('');
    animateRotateBoxes();
}

function animateEasingBalls() {
    document.querySelectorAll('.easing-ball').forEach(ball => {
        let forward = true;
        const ease = ball.dataset.ease;
        const animate = () => {
            const parent = ball.parentElement;
            const maxLeft = parent.offsetWidth - 24;
            ball.style.transition = `left 1s ${ease}`;
            ball.style.left = forward ? `${maxLeft}px` : '0px';
            forward = !forward;
        };
        setInterval(animate, 1100);
        animate();
    });
}

function animateScaleBoxes() {
    document.querySelectorAll('.scale-box').forEach((box, i) => {
        let enlarged = false;
        const scales = [1, 1.05, 1.1, 1.15];
        setInterval(() => {
            box.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            box.style.transform = enlarged ? 'scale(1)' : `scale(${scales[i]})`;
            enlarged = !enlarged;
        }, 1200);
    });
}

function animateRotateBoxes() {
    document.querySelectorAll('.rotate-box').forEach(box => {
        const rotateVal = box.dataset.rotate;
        setInterval(() => {
            box.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            box.style.transform = rotateVal;
            setTimeout(() => {
                box.style.transform = 'rotate(0deg)';
            }, 600);
        }, 1500);
    });
}

    const pEl = document.getElementById('preset-colors');

        ${PRESET_COLORS.map(c => `<div style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;background:${c.hex};color:${isLightColor(c.hex) ? '#000' : '#fff'};font-size:11px;font-weight:500;">
            <div style="width:10px;height:10px;border-radius:2px;background:${isLightColor(c.hex) ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)'};"></div>
            ${c.name}
        </div>`).join('')}
    </div>`;
}

function isLightColor(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}

/* ============================
   Theme Toggle
   ============================ */
function toggleTheme() {
    const body = document.body;
    const isNowDark = body.classList.contains('light-mode');
    body.classList.toggle('light-mode');
    body.classList.toggle('dark-mode');

    document.getElementById('themeLabel').textContent = isNowDark ? '切换亮色' : '切换暗色';
    document.querySelector('.icon-sun').style.display = isNowDark ? 'none' : 'block';
    document.querySelector('.icon-moon').style.display = isNowDark ? 'block' : 'none';

    const subtitle = document.querySelector('.main-container > div:first-child p');
    subtitle.textContent = isNowDark ? '深色模式 · 翻译版设计令牌 v1.0' : '浅色模式 · 翻译版设计令牌 v1.0';

    // Update font family box
    const ffBox = document.querySelector('.font-family-box');
    if (ffBox) {
        ffBox.style.background = isNowDark ? 'rgba(35,36,41,1)' : 'rgba(var(--semi-grey-0),1)';
    }

    // 切换色板数据
    PALETTES = isNowDark ? PALETTES_DARK : PALETTES_LIGHT;
    
    // 重新渲染所有色板
    renderBrandPalettes();
    renderTypicalColors();
    renderDataPalette();
    renderFullPalette();
    renderBgLevels();
    renderLinkColors();
    renderComponentDemos();
    renderShadows();
    renderSizing();
    
    renderTextDemo();
    lucide.createIcons();
}
