        * { box-sizing: border-box; margin: 0; padding: 0; }

        .light-mode .class-item { background: rgba(var(--semi-grey-1),1); color: rgba(var(--semi-grey-8),1); }
        .dark-mode .class-item { background: rgba(53,54,60,1); color: rgba(200,200,200,1); }

        .light-mode .theme-toggle { background: rgba(var(--semi-grey-9),1); color: #fff; }
        .dark-mode .theme-toggle { background: rgba(249,249,249,1); color: rgba(28,31,35,1); }

let isDark = false;

function toggleTheme() {
    isDark = !isDark;
    document.body.classList.toggle('light-mode');
    document.body.classList.toggle('dark-mode');
    document.getElementById('iconSun').style.display = isDark ? 'none' : 'inline';
    document.getElementById('iconMoon').style.display = isDark ? 'inline' : 'none';
    document.getElementById('themeLabel').textContent = isDark ? '切换亮色' : '切换暗色';
}

function buildNav() {
    const nav = document.getElementById('nav');
    nav.innerHTML = navGroups.map(g => `<div class="nav-group"><div class="nav-group-title">${g.title}</div>${
        g.items.map(item => {
            if (typeof item === 'object') return `<div class="nav-item active" data-target="${item.id}">${item.label}</div>`;
            const c = C[item]; return `<div class="nav-item" data-target="${item}">${c ? c.name : item}</div>`;
        }).join('')
    }</div>`).join('');
    nav.addEventListener('click', e => {
        const item = e.target.closest('.nav-item');
        if (!item) return;
        nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const t = document.getElementById(item.dataset.target);
        if (t) t.scrollIntoView({ behavior:'smooth', block:'start' });
    });
    window.addEventListener('scroll', () => {
        const sections = document.querySelectorAll('.component-section');
        const atBottom = (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 50);
        let cur = 'overview';
        if (atBottom) {
            cur = sections[sections.length - 1]?.id || cur;
        } else {
            sections.forEach(s => { if (s.getBoundingClientRect().top <= 150) cur = s.id; });
        }
        nav.querySelectorAll('.nav-item').forEach(i => { i.classList.toggle('active', i.dataset.target === cur); });
        const activeItem = nav.querySelector('.nav-item.active');
        if (activeItem) { activeItem.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
    });
}

function toggleClassList(btn) {
    const container = btn.nextElementSibling;
    container.classList.toggle('open');
    btn.textContent = container.classList.contains('open') ? '收起类名列表' : '展开类名列表';
}

function classListHTML(classes) {
    return `<button class="toggle-classes" onclick="toggleClassList(this)">展开类名列表 (${classes.length})</button><div class="classes-container"><div class="class-list">${classes.map(c=>`<span class="class-item">${c}</span>`).join('')}</div></div>`;
}

function compSection(id, demoHTML) {
    const c = C[id]; if (!c) return '';
    return `<div id="${id}" class="component-section">
        <div class="comp-header"><div class="section-title">${c.name}</div><span class="category-tag ${catMap[c.cat]}">${catLabel[c.cat]}</span><span class="sub-label" style="margin:0">${c.rules} 条样式规则 | ${c.classes.length} 个类名</span></div>
        <div class="comp-desc">${c.desc}</div>
        ${demoHTML}
        ${classListHTML(c.classes)}
    </div>`;
}

/* ============ DatePicker Range Component ============ */
let dpLeftYear = 2026, dpLeftMonth = 3;
let dpRangeStart = new Date(2026,3,4), dpRangeEnd = new Date(2026,3,10);
let dpSelecting = false, dpHoverDate = null;
const dpToday = new Date(2026,3,18);

const dpLD = {
    '2026-3-30':'十五','2026-3-31':'十六',
    '2026-4-1':'十七','2026-4-2':'十八','2026-4-3':'十九','2026-4-4':'清明','2026-4-5':'清明节',
    '2026-4-6':'清明节','2026-4-7':'廿三','2026-4-8':'廿四','2026-4-9':'廿五','2026-4-10':'廿六',
    '2026-4-11':'廿七','2026-4-12':'青年节','2026-4-13':'廿九','2026-4-14':'三十','2026-4-15':'四月',
    '2026-4-16':'初二','2026-4-17':'初三','2026-4-18':'初四','2026-4-19':'谷雨',
    '2026-4-20':'初六','2026-4-21':'初七','2026-4-22':'初八','2026-4-23':'初九','2026-4-24':'初十',
    '2026-4-25':'十一','2026-4-26':'十二','2026-4-27':'十三','2026-4-28':'十四','2026-4-29':'十五','2026-4-30':'十六',
    '2026-5-1':'劳动节','2026-5-2':'劳动节','2026-5-3':'劳动节','2026-5-4':'劳动节','2026-5-5':'立夏',
    '2026-5-6':'廿二','2026-5-7':'廿三','2026-5-8':'廿四','2026-5-9':'廿五','2026-5-10':'廿六',
    '2026-5-11':'廿七','2026-5-12':'护士节','2026-5-13':'廿九','2026-5-14':'五月',
    '2026-5-15':'初二','2026-5-16':'初三','2026-5-17':'初四','2026-5-18':'初五','2026-5-19':'初六',
    '2026-5-20':'初七','2026-5-21':'小满','2026-5-22':'初九','2026-5-23':'初十','2026-5-24':'十一',
    '2026-5-25':'十二','2026-5-26':'十三','2026-5-27':'十四','2026-5-28':'十五',
    '2026-5-29':'十六','2026-5-30':'十七','2026-5-31':'十八',
    '2026-6-1':'十九','2026-6-2':'二十','2026-6-3':'廿一','2026-6-4':'廿二','2026-6-5':'芒种',
    '2026-6-6':'廿四','2026-6-7':'廿五',
    '2026-3-23':'初八','2026-3-24':'初九','2026-3-25':'初十','2026-3-26':'十一','2026-3-27':'十二','2026-3-28':'十三','2026-3-29':'十四'
};
const dpHT = {'清明':'holiday','清明节':'festival','谷雨':'holiday','青年节':'festival','劳动节':'festival','立夏':'holiday','护士节':'festival','小满':'holiday','芒种':'holiday'};

function dpDim(y,m){return new Date(y,m+1,0).getDate();}
function dpFdow(y,m){let d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function dpSame(a,b){return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function dpFmt(d){if(!d)return '';let m=''+(d.getMonth()+1),day=''+d.getDate();return d.getFullYear()+'-'+(m.length<2?'0'+m:m)+'-'+(day.length<2?'0'+day:day);}
function dpNextMonth(y,m){return m===11?{y:y+1,m:0}:{y:y,m:m+1};}
function dpPrevMonth(y,m){return m===0?{y:y-1,m:11}:{y:y,m:m-1};}

function dpInRange(dt){
    if(!dpRangeStart) return false;
    if(dpSelecting && dpHoverDate){
        let s=dpRangeStart, e=dpHoverDate;
        if(e<s){let t=s;s=e;e=t;}
        return dt>=s&&dt<=e;
    }
    if(dpRangeStart&&dpRangeEnd) return dt>=dpRangeStart&&dt<=dpRangeEnd;
    return false;
}
function dpGetRangeStartEnd(){
    if(dpSelecting&&dpHoverDate){
        let s=dpRangeStart,e=dpHoverDate;
        if(e<s){let t=s;s=e;e=t;}
        return {s,e};
    }
    return {s:dpRangeStart,e:dpRangeEnd};
}

function dpRenderMonth(id,y,m,showLeft,showRight){
    const el=document.getElementById(id);
    if(!el) return;
    const ds=dpDim(y,m),f=dpFdow(y,m),pd=dpDim(y,m-1);
    const ic=(pts)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${pts}</svg>`;
    const cL=ic('<polyline points="15 18 9 12 15 6"/>');
    const cDL=ic('<polyline points="11 18 5 12 11 6"/><polyline points="19 18 13 12 19 6"/>');
    const cR=ic('<polyline points="9 18 15 12 9 6"/>');
    const cDR=ic('<polyline points="13 18 19 12 13 6"/><polyline points="5 18 11 12 5 6"/>');
    let nL=showLeft?`<button class="dp-nav-btn" onclick="dpNavPrev()">${cL}</button><button class="dp-nav-btn" onclick="dpNavPrevYear()">${cDL}</button>`:'<div style="width:60px"></div>';
    let nR=showRight?`<button class="dp-nav-btn" onclick="dpNavNextYear()">${cDR}</button><button class="dp-nav-btn" onclick="dpNavNext()">${cR}</button>`:'<div style="width:60px"></div>';
    let h=`<div class="semi-dp-navigation"><div style="display:flex;gap:2px">${nL}</div><div class="semi-dp-navigation-month">${y}年 ${m+1}月</div><div style="display:flex;gap:2px">${nR}</div></div>`;
    h+='<div class="semi-dp-weekday">';
    ['一','二','三','四','五','六','日'].forEach(w=>{h+=`<div class="semi-dp-weekday-item">${w}</div>`;});
    h+='</div><div class="semi-dp-weeks">';
    const {s:rs,e:re}=dpGetRangeStartEnd();
    for(let i=f-1;i>=0;i--){
        const d=pd-i,pm=m-1<0?11:m-1,py=m-1<0?y-1:y,dt=new Date(py,pm,d);
        const k=`${py}-${pm+1}-${d}`,sub=dpLD[k]||'',tp=dpHT[sub]||'';
        let c='semi-dp-day other-month';
        if(rs&&re&&dt>=rs&&dt<=re) c+=' in-range';
        h+=`<div class="${c}" data-dp-date="${py}-${pm}-${d}"><span class="day-number">${d}</span><span class="day-sub ${tp}">${sub}</span></div>`;
    }
    for(let d=1;d<=ds;d++){
        const dt=new Date(y,m,d),k=`${y}-${m+1}-${d}`,sub=dpLD[k]||'',tp=dpHT[sub]||'';
        let c='semi-dp-day';
        if(dpSame(dt,dpToday)) c+=' today';
        const isStart=rs&&dpSame(dt,rs), isEnd=re&&dpSame(dt,re);
        const isIn=rs&&re&&dt>=rs&&dt<=re;
        if(isStart&&isEnd) c+=' selected range-start range-end';
        else if(isStart) c+=' selected range-start in-range';
        else if(isEnd) c+=' selected range-end in-range';
        else if(isIn) c+=' in-range';
        if(dpSelecting&&dpHoverDate&&dpSame(dt,dpHoverDate)&&!isStart) c+=' hover-range-end';
        h+=`<div class="${c}" data-dp-date="${y}-${m}-${d}" onmouseenter="dpOnDayHover(this)" onclick="dpOnDayClick(this)"><span class="day-number">${d}</span><span class="day-sub ${tp}">${sub}</span></div>`;
    }
    const tot=f+ds,rem=tot%7===0?0:7-tot%7;
    for(let d=1;d<=rem;d++){
        const nm=m+1>11?0:m+1,ny=m+1>11?y+1:y,dt=new Date(ny,nm,d);
        const k=`${ny}-${nm+1}-${d}`,sub=dpLD[k]||'',tp=dpHT[sub]||'';
        let c='semi-dp-day other-month';
        if(rs&&re&&dt>=rs&&dt<=re) c+=' in-range';
        h+=`<div class="${c}" data-dp-date="${ny}-${nm}-${d}"><span class="day-number">${d}</span><span class="day-sub ${tp}">${sub}</span></div>`;
    }
    h+='</div>';el.innerHTML=h;
}

function dpRenderAll(){
    const r=dpNextMonth(dpLeftYear,dpLeftMonth);
    dpRenderMonth('dpLeftMonth',dpLeftYear,dpLeftMonth,true,false);
    dpRenderMonth('dpRightMonth',r.y,r.m,false,true);
}
function dpNavPrev(){const p=dpPrevMonth(dpLeftYear,dpLeftMonth);dpLeftYear=p.y;dpLeftMonth=p.m;dpRenderAll();}
function dpNavNext(){const n=dpNextMonth(dpLeftYear,dpLeftMonth);dpLeftYear=n.y;dpLeftMonth=n.m;dpRenderAll();}
function dpNavPrevYear(){dpLeftYear--;dpRenderAll();}
function dpNavNextYear(){dpLeftYear++;dpRenderAll();}

function dpParseDate(el){
    const p=el.dataset.dpDate.split('-').map(Number);
    return new Date(p[0],p[1],p[2]);
}
function dpOnDayClick(el){
    const dt=dpParseDate(el);
    if(!dpSelecting){
        dpRangeStart=dt; dpRangeEnd=null; dpSelecting=true; dpHoverDate=dt;
        dpRenderAll();
    } else {
        if(dt<dpRangeStart){dpRangeEnd=dpRangeStart;dpRangeStart=dt;}
        else{dpRangeEnd=dt;}
        dpSelecting=false; dpHoverDate=null;
        dpRenderAll(); dpUpdateInput();
        setTimeout(()=>dpClosePanel(), 180);
    }
}
function dpOnDayHover(el){
    if(!dpSelecting) return;
    const dt=dpParseDate(el);
    if(dpHoverDate&&dpSame(dt,dpHoverDate)) return;
    dpHoverDate=dt;
    document.querySelectorAll('.semi-dp-day[data-dp-date]').forEach(cell=>{
        if(!cell.dataset.dpDate) return;
        const cp=cell.dataset.dpDate.split('-').map(Number);
        const cd=new Date(cp[0],cp[1],cp[2]);
        const {s:rs,e:re}=dpGetRangeStartEnd();
        const isStart=rs&&dpSame(cd,rs), isEnd=re&&dpSame(cd,re);
        const isIn=rs&&re&&cd>=rs&&cd<=re;
        const isHoverEnd=dpSame(cd,dpHoverDate)&&!isStart;
        cell.classList.remove('in-range','selected','range-start','range-end','hover-range-end');
        if(isStart&&isEnd){cell.classList.add('selected','range-start','range-end');}
        else if(isStart){cell.classList.add('selected','range-start','in-range');}
        else if(isEnd){cell.classList.add('selected','range-end','in-range');}
        else if(isIn){cell.classList.add('in-range');}
        if(isHoverEnd) cell.classList.add('hover-range-end');
    });
}
function dpUpdateInput(){
    const st=document.getElementById('dpStartText'), et=document.getElementById('dpEndText');
    if(!st||!et) return;
    st.textContent=dpFmt(dpRangeStart);
    st.classList.toggle('placeholder',!dpRangeStart);
    et.textContent=dpRangeEnd?dpFmt(dpRangeEnd):'请选择';
    et.classList.toggle('placeholder',!dpRangeEnd);
}
function dpOpenPanel(){
    const p=document.getElementById('dpPanel'),o=document.getElementById('dpOverlay'),i=document.getElementById('dpRangeInput');
    if(!p) return;
    p.classList.add('open'); o.classList.add('open'); i.classList.add('focus');
    dpRenderAll();
}
function dpClosePanel(){
    const p=document.getElementById('dpPanel'),o=document.getElementById('dpOverlay'),i=document.getElementById('dpRangeInput');
    if(!p) return;
    p.classList.remove('open'); o.classList.remove('open'); i.classList.remove('focus');
    if(dpSelecting){ dpSelecting=false; dpHoverDate=null; }
}
function dpInit(){
    const ri=document.getElementById('dpRangeInput'), ov=document.getElementById('dpOverlay');
    if(!ri) return;
    ri.addEventListener('click',()=>{
        const p=document.getElementById('dpPanel');
        if(p.classList.contains('open')) dpClosePanel(); else dpOpenPanel();
    });
    ov.addEventListener('click',()=>{
        if(dpSelecting){dpRangeEnd=null;dpSelecting=false;dpUpdateInput();}
        dpClosePanel();
    });
    dpUpdateInput();
    dpRenderAll();
}

document.addEventListener('DOMContentLoaded', () => { buildNav(); buildPage(); dpInit(); });
